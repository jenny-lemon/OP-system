name: Daily Performance Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # 台北時間每天 08:00（GitHub Actions 用 UTC）

jobs:
  run-performance-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml

      - name: Create runtime folders
        run: |
          mkdir -p ./report_output
          mkdir -p ./report_output/_dashboard_sales/latest
          mkdir -p ./report_output/_dashboard_sales/snapshots
          mkdir -p ./report_output/_dashboard_sales/execution_logs
          mkdir -p ./report_output/_dashboard_sales/daily_overview_history

      - name: Write accounts.py from GitHub Secret
        env:
          ACCOUNTS_PY: ${{ secrets.ACCOUNTS_PY }}
        run: |
          cat > accounts.py <<'PY'
          ${{ secrets.ACCOUNTS_PY }}
          PY

      - name: Write paths.py for GitHub Actions
        run: |
          cat > paths.py <<'PY'
          import os
          BASE_DIR = os.path.dirname(__file__)
          OUTPUT_BASE = os.path.join(BASE_DIR, "report_output")

          PATH_SCHEDULE = os.path.join(OUTPUT_BASE, "schedule")
          PATH_CLEANER_SCHEDULE = os.path.join(OUTPUT_BASE, "cleaner_schedule")
          PATH_CLEANER_DATA = os.path.join(OUTPUT_BASE, "cleaner_data")
          PATH_ORDER = os.path.join(OUTPUT_BASE, "orders")
          PATH_REPORT = os.path.join(OUTPUT_BASE, "reports")
          PATH_VIP = os.path.join(OUTPUT_BASE, "vip")
          PATH_HR = os.path.join(OUTPUT_BASE, "hr")

          for p in [
              PATH_SCHEDULE,
              PATH_CLEANER_SCHEDULE,
              PATH_CLEANER_DATA,
              PATH_ORDER,
              PATH_REPORT,
              PATH_VIP,
              PATH_HR,
          ]:
              os.makedirs(p, exist_ok=True)
          PY

      - name: Run performance report
        env:
          TZ: Asia/Taipei
        run: |
          python performance_report.py schedule true

      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-output
          path: |
            report_output/
          if-no-files-found: warn

name: Nightly Reports

on:
  workflow_dispatch:
  schedule:
    - cron: '10 17 * * *'  # 台北 01:10

jobs:
  run-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: Asia/Taipei

      TAIPEI_EMAIL: ${{ secrets.TAIPEI_EMAIL }}
      TAIPEI_PASSWORD: ${{ secrets.TAIPEI_PASSWORD }}
      TAICHUNG_EMAIL: ${{ secrets.TAICHUNG_EMAIL }}
      TAICHUNG_PASSWORD: ${{ secrets.TAICHUNG_PASSWORD }}
      TAOYUAN_EMAIL: ${{ secrets.TAOYUAN_EMAIL }}
      TAOYUAN_PASSWORD: ${{ secrets.TAOYUAN_PASSWORD }}
      HSINCHU_EMAIL: ${{ secrets.HSINCHU_EMAIL }}
      HSINCHU_PASSWORD: ${{ secrets.HSINCHU_PASSWORD }}
      KAOHSIUNG_EMAIL: ${{ secrets.KAOHSIUNG_EMAIL }}
      KAOHSIUNG_PASSWORD: ${{ secrets.KAOHSIUNG_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml streamlit google-auth google-auth-oauthlib google-api-python-client

      - name: Ensure output folders exist
        run: |
          python - <<'PY'
          import os
          try:
              from paths import (
                  PATH_SCHEDULE, PATH_CLEANER_SCHEDULE, PATH_CLEANER_DATA,
                  PATH_ORDER, PATH_REPORT, PATH_VIP, PATH_HR
              )
              for p in [
                  PATH_SCHEDULE, PATH_CLEANER_SCHEDULE, PATH_CLEANER_DATA,
                  PATH_ORDER, PATH_REPORT, PATH_VIP, PATH_HR
              ]:
                  os.makedirs(p, exist_ok=True)
          except Exception as e:
              print(f"skip ensure paths: {e}")
          PY

      # 🔥 1. 排班統計表
      - name: Run schedule report
        run: |
          python schedule_report.py

      # 🔥 2. 專員班表
      - name: Run staff schedule
        run: |
          python staff_schedule.py

      # 🔥 3. 專員個資
      - name: Run staff info
        run: |
          python staff_info.py

      # 🔥 4. 訂單資料
      - name: Run orders report
        run: |
          python orders_report.py

      - name: Upload generated files
        uses: actions/upload-artifact@v6
        with:
          name: nightly-reports-output
          path: .
          if-no-files-found: warn

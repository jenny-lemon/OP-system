name: Nightly Reports

on:
  workflow_dispatch:
  schedule:
    - cron: '10 17 * * *'  # 台北 01:10

jobs:
  run-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: Asia/Taipei
      TAIPEI_EMAIL: ${{ secrets.TAIPEI_EMAIL }}
      TAIPEI_PASSWORD: ${{ secrets.TAIPEI_PASSWORD }}
      TAICHUNG_EMAIL: ${{ secrets.TAICHUNG_EMAIL }}
      TAICHUNG_PASSWORD: ${{ secrets.TAICHUNG_PASSWORD }}
      TAOYUAN_EMAIL: ${{ secrets.TAOYUAN_EMAIL }}
      TAOYUAN_PASSWORD: ${{ secrets.TAOYUAN_PASSWORD }}
      HSINCHU_EMAIL: ${{ secrets.HSINCHU_EMAIL }}
      HSINCHU_PASSWORD: ${{ secrets.HSINCHU_PASSWORD }}
      KAOHSIUNG_EMAIL: ${{ secrets.KAOHSIUNG_EMAIL }}
      KAOHSIUNG_PASSWORD: ${{ secrets.KAOHSIUNG_PASSWORD }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Debug trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "UTC:"
          date -u
          echo "Taipei:"
          TZ=Asia/Taipei date

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml streamlit google-auth google-auth-oauthlib google-api-python-client

      - name: Run schedule report
        run: python schedule_report.py

      - name: Run staff schedule
        run: python staff_schedule.py

      - name: Run staff info
        run: python staff_info.py

      - name: Run orders report
        run: python orders_report.py

      - name: Run performance report
        run: python performance_report.py schedule true

      - name: Upload generated files
        uses: actions/upload-artifact@v6
        with:
          name: nightly-reports-output
          path: .
          if-no-files-found: warn

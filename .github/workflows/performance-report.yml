name: Daily Performance Report

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * *'    # 台北 08:07
    - cron: '7 10 * * *'   # 台北 18:07
    - cron: '15 16 * * *'  # 台北 00:15

jobs:
  run-performance-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Taipei
      TAIPEI_EMAIL: ${{ secrets.TAIPEI_EMAIL }}
      TAIPEI_PASSWORD: ${{ secrets.TAIPEI_PASSWORD }}
      TAICHUNG_EMAIL: ${{ secrets.TAICHUNG_EMAIL }}
      TAICHUNG_PASSWORD: ${{ secrets.TAICHUNG_PASSWORD }}
      TAOYUAN_EMAIL: ${{ secrets.TAOYUAN_EMAIL }}
      TAOYUAN_PASSWORD: ${{ secrets.TAOYUAN_PASSWORD }}
      HSINCHU_EMAIL: ${{ secrets.HSINCHU_EMAIL }}
      HSINCHU_PASSWORD: ${{ secrets.HSINCHU_PASSWORD }}
      KAOHSIUNG_EMAIL: ${{ secrets.KAOHSIUNG_EMAIL }}
      KAOHSIUNG_PASSWORD: ${{ secrets.KAOHSIUNG_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Debug trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "UTC:"
          date -u
          echo "Taipei:"
          TZ=Asia/Taipei date

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml streamlit

      - name: Ensure output folders exist
        run: |
          python - <<'PY'
          import os
          try:
              from paths import (
                  PATH_SCHEDULE, PATH_CLEANER_SCHEDULE, PATH_CLEANER_DATA,
                  PATH_ORDER, PATH_REPORT, PATH_VIP, PATH_HR
              )
              for p in [
                  PATH_SCHEDULE, PATH_CLEANER_SCHEDULE, PATH_CLEANER_DATA,
                  PATH_ORDER, PATH_REPORT, PATH_VIP, PATH_HR
              ]:
                  os.makedirs(p, exist_ok=True)
                  print("OK:", p)
          except Exception as e:
              print(f"skip ensure paths: {e}")
          PY

      - name: Run performance report
        run: |
          python performance_report.py schedule false

      - name: Show generated dashboard files
        run: |
          echo "pwd=$(pwd)"
          find dashboard_data -maxdepth 3 -type f | sort || true
          ls -la dashboard_data || true
          ls -la dashboard_data/latest || true

      - name: Upload generated files
        uses: actions/upload-artifact@v6
        with:
          name: performance-report-output
          path: |
            dashboard_data
          if-no-files-found: warn
          compression-level: 6

      - name: Commit and push dashboard data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard_data
          git status
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "update dashboard data"
          git push origin HEAD:main
